<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joshua's Express Deliveries – Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Barlow Condensed', sans-serif;
    cursor: pointer;
    user-select: none;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── SCENE ── */
  #scene {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 900px;
  }

  /* ── GRID FLOOR ── */
  #grid-floor {
    position: fixed;
    bottom: -10%;
    left: 50%;
    transform: translateX(-50%) rotateX(70deg);
    width: 200vw;
    height: 200vw;
    background-image:
      linear-gradient(rgba(232,65,26,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,65,26,0.18) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 2;
    opacity: 0;
    animation: gridFade 1s ease 0.5s forwards;
  }

  @keyframes gridFade {
    to { opacity: 1; }
  }

  /* ── SCAN LINES ── */
  #scanlines {
    position: fixed;
    inset: 0;
    z-index: 30;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* ── SPEED LINES ── */
  #speed-lines {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    overflow: hidden;
    opacity: 0;
  }
  .speed-line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(232,65,26,0.7), transparent);
    transform-origin: left center;
    animation: speedLine 0.6s ease-out forwards;
  }
  @keyframes speedLine {
    from { width: 0; opacity: 1; }
    to { width: 100%; opacity: 0; }
  }

  /* ── MAIN WRAPPER ── */
  #main-wrapper {
    position: relative;
    z-index: 20;
    text-align: center;
    transform-style: preserve-3d;
  }

  /* ── TRUCK CONTAINER ── */
  #truck-container {
    position: relative;
    margin-bottom: 30px;
    transform-style: preserve-3d;
    opacity: 0;
    transform: translateZ(-300px) scale(0.3);
    animation: truckReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
  }
  @keyframes truckReveal {
    to { opacity: 1; transform: translateZ(0) scale(1); }
  }

  #truck-svg {
    width: 380px;
    filter: drop-shadow(0 0 40px rgba(232,65,26,0.6)) drop-shadow(0 0 80px rgba(232,65,26,0.3));
    animation: truckFloat 3s ease-in-out 2s infinite;
  }
  @keyframes truckFloat {
    0%, 100% { transform: translateY(0px) rotateY(0deg); }
    50% { transform: translateY(-12px) rotateY(3deg); }
  }

  /* Glow pulse under truck */
  #truck-glow {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(232,65,26,0.5) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 2s ease-in-out 2s infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
    50% { opacity: 1; transform: translateX(-50%) scaleX(1.2); }
  }

  /* ── LOGO BOX ── */
  #logo-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #e8411a;
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    width: 70px;
    height: 70px;
    border-radius: 16px;
    margin-bottom: 18px;
    opacity: 0;
    transform: rotateY(90deg) scale(0.5);
    animation: logoSpin 0.8s cubic-bezier(0.34,1.56,0.64,1) 1.6s forwards;
    box-shadow: 0 0 30px rgba(232,65,26,0.7), 0 0 60px rgba(232,65,26,0.3);
    letter-spacing: 1px;
  }
  @keyframes logoSpin {
    to { opacity: 1; transform: rotateY(0deg) scale(1); }
  }

  /* ── TITLE ── */
  #title-wrapper {
    overflow: hidden;
    margin-bottom: 8px;
  }
  #title-joshua {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(64px, 12vw, 110px);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.9;
    background: linear-gradient(90deg, #e8411a 0%, #ff9a00 25%, #ffe566 50%, #ff9a00 75%, #e8411a 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleSlide 1s cubic-bezier(0.16,1,0.3,1) 2s both, shine 2.5s linear 3s infinite;
    transform: translateY(120px);
    display: block;
  }
  @keyframes titleSlide {
    to { transform: translateY(0); }
  }
  @keyframes shine {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  #title-express {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(40px, 7vw, 68px);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 8px;
    color: #ffffff;
    display: block;
    opacity: 0;
    transform: translateY(80px);
    animation: titleSlide2 0.9s cubic-bezier(0.16,1,0.3,1) 2.3s forwards;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
  }
  @keyframes titleSlide2 {
    to { opacity: 1; transform: translateY(0); }
  }

  #title-deliveries {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 12px;
    color: #e8411a;
    display: block;
    margin-top: 4px;
    opacity: 0;
    transform: scaleX(0.3);
    animation: deliveriesReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 2.7s forwards;
  }
  @keyframes deliveriesReveal {
    to { opacity: 1; transform: scaleX(1); }
  }

  /* ── TAGLINE ── */
  #tagline {
    margin-top: 24px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #888;
    opacity: 0;
    animation: fadeUp 0.8s ease 3.2s forwards;
  }
  #tagline span {
    color: #e8411a;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── DIVIDER LINE ── */
  #divider {
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #e8411a, #ff9a00, #e8411a, transparent);
    margin: 20px auto;
    border-radius: 2px;
    animation: dividerGrow 1s ease 2.9s forwards;
  }
  @keyframes dividerGrow {
    to { width: 340px; }
  }

  /* ── CORNER BRACKETS ── */
  .corner {
    position: fixed;
    width: 50px;
    height: 50px;
    z-index: 25;
    opacity: 0;
    animation: cornerFade 0.5s ease 1.2s forwards;
  }
  .corner svg { width: 100%; height: 100%; }
  #c-tl { top: 24px; left: 24px; }
  #c-tr { top: 24px; right: 24px; transform: scaleX(-1); }
  #c-bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  #c-br { bottom: 24px; right: 24px; transform: scale(-1,-1); }
  @keyframes cornerFade {
    to { opacity: 1; }
  }

  /* ── HUD LINES ── */
  .hud-line {
    position: fixed;
    background: rgba(232,65,26,0.2);
    z-index: 6;
    opacity: 0;
    animation: hudFade 0.5s ease 1.5s forwards;
  }
  #hud-top { top: 80px; left: 0; right: 0; height: 1px; }
  #hud-bottom { bottom: 80px; left: 0; right: 0; height: 1px; }
  #hud-left { left: 80px; top: 0; bottom: 0; width: 1px; }
  #hud-right { right: 80px; top: 0; bottom: 0; width: 1px; }
  @keyframes hudFade {
    to { opacity: 1; }
  }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 8;
    animation: particleFly linear forwards;
  }
  @keyframes particleFly {
    0% { opacity: 0.9; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ── BADGE / TAGBADGE ── */
  #badge-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease 3.5s forwards;
  }
  .badge-pill {
    background: rgba(232,65,26,0.12);
    border: 1.5px solid rgba(232,65,26,0.35);
    border-radius: 100px;
    padding: 8px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e8411a;
  }

  /* ── CONTINUE BUTTON ── */
  #continue-btn {
    display: block;
    margin: 28px auto 0;
    position: relative;
    z-index: 50;
    background: linear-gradient(135deg, #e8411a, #ff6a00);
    border: none;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 16px 48px;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.6s ease 4.2s forwards;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 30px rgba(232,65,26,0.4);
  }
  #continue-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 40px rgba(232,65,26,0.7);
  }
  #continue-btn::after {
    content: ' →';
    opacity: 0.8;
  }

  /* ── TRANSITION WIPE ── */
  #transition-wipe {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #e8411a;
    transform: scaleX(0);
    transform-origin: left center;
    pointer-events: none;
  }
  #transition-wipe.wipe-in {
    animation: wipeIn 0.5s cubic-bezier(0.86,0,0.07,1) forwards;
  }
  @keyframes wipeIn {
    from { transform: scaleX(0); transform-origin: left center; }
    to   { transform: scaleX(1); transform-origin: left center; }
  }

  /* ── FLASH ── */
  #flash {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    animation: flashOut 0.6s ease 0.1s forwards;
  }
  @keyframes flashOut {
    0% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* ── STRIPE TEXTURE ── */
  #stripe-overlay {
    position: fixed;
    inset: 0;
    z-index: 3;
    background: repeating-linear-gradient(
      135deg,
      transparent,
      transparent 30px,
      rgba(255,255,255,0.012) 30px,
      rgba(255,255,255,0.012) 32px
    );
    pointer-events: none;
  }

  /* ── COUNTDOWN / LOADING ── */
  #loading-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: loadingOut 0.6s ease 0.6s forwards;
  }
  #loading-logo {
    background: #e8411a;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    width: 70px;
    height: 70px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    animation: loadingPulse 0.4s ease infinite alternate;
  }
  @keyframes loadingPulse {
    to { box-shadow: 0 0 40px rgba(232,65,26,0.8); transform: scale(1.05); }
  }
  #loading-bar-wrap {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #e8411a, #ff9a00);
    border-radius: 2px;
    animation: loadBar 0.55s ease forwards;
  }
  @keyframes loadBar {
    from { width: 0; }
    to { width: 100%; }
  }
  @keyframes loadingOut {
    to { opacity: 0; pointer-events: none; }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div id="loading-logo">JED</div>
  <div id="loading-bar-wrap">
    <div id="loading-bar"></div>
  </div>
</div>

<!-- Flash effect -->
<div id="flash"></div>

<!-- Animated particle canvas -->
<canvas id="bg"></canvas>

<!-- Stripe texture overlay -->

<!-- Grid floor -->
<div id="grid-floor"></div>

<!-- HUD lines -->
<div class="hud-line" id="hud-top"></div>
<div class="hud-line" id="hud-bottom"></div>
<div class="hud-line" id="hud-left"></div>
<div class="hud-line" id="hud-right"></div>

<!-- Scan lines -->
<div id="scanlines"></div>

<!-- Speed lines -->
<div id="speed-lines"></div>

<!-- Corner brackets -->
<div class="corner" id="c-tl">
  <svg viewBox="0 0 50 50" fill="none">
    <path d="M0 40 L0 0 L40 0" stroke="#e8411a" stroke-width="3" stroke-linecap="square"/>
    <circle cx="0" cy="0" r="4" fill="#e8411a"/>

</div>
<div class="corner" id="c-tr">
  <svg viewBox="0 0 50 50" fill="none">

    <circle cx="0" cy="0" r="4" fill="#e8411a"/>
  </svg>
</div>
<div class="corner" id="c-bl">
  <svg viewBox="0 0 50 50" fill="none">
    <path d="M0 40 L0 0 L40 0" stroke="#e8411a" stroke-width="3" stroke-linecap="square"/>
    <circle cx="0" cy="0" r="4" fill="#e8411a"/>
  </svg>
</div>
<div class="corner" id="c-br">
  <svg viewBox="0 0 50 50" fill="none">
    <path d="M0 40 L0 0 L40 0" stroke="#e8411a" stroke-width="3" stroke-linecap="square"/>
    <circle cx="0" cy="0" r="4" fill="#e8411a"/>
  </svg>
</div>

<!-- Main scene -->
<div id="scene">
  <div id="main-wrapper">

    <!-- Logo box -->
    <div id="logo-box">JED</div>

    <!-- Truck SVG -->
    <div id="truck-container">
      <div id="truck-glow"></div>

        <!-- TRAILER body -->
        <rect x="60" y="60" width="290" height="130" rx="8" fill="#1a1a1a" stroke="#e8411a" stroke-width="2.5"/>

        <!-- Trailer stripe -->
        <rect x="60" y="110" width="290" height="6" fill="#e8411a" opacity="0.6"/>

        <!-- JED Logo on trailer -->
        <rect x="130" y="78" width="155" height="80" rx="6" fill="#111" stroke="rgba(232,65,26,0.3)" stroke-width="1.5"/>
        <text x="207" y="128" font-family="Barlow Condensed,sans-serif" font-size="42" font-weight="900" fill="#e8411a" text-anchor="middle" letter-spacing="4">JED</text>
        <text x="207" y="146" font-family="Barlow Condensed,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">EXPRESS</text>

        <!-- Trailer rear door lines -->
        <line x1="350" y1="65" x2="350" y2="185" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
        <line x1="310" y1="65" x2="310" y2="185" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

        <!-- Cab windshield -->

        <!-- Windshield reflection -->

        <!-- Headlight glow -->

        <!-- Tail lights -->

        <!-- WHEELS - rear trailer -->

        <!-- WHEELS - cab -->
        <circle cx="400" cy="195" r="22" fill="#111" stroke="#e8411a" stroke-width="2.5"/>
        <circle cx="400" cy="195" r="14" fill="#1a1a1a" stroke="rgba(232,65,26,0.4)" stroke-width="1.5"/>
        <circle cx="400" cy="195" r="5" fill="#e8411a"/>
        <line x1="400" y1="181" x2="400" y2="209" stroke="rgba(232,65,26,0.5)" stroke-width="1.5"/>
        <line x1="386" y1="195" x2="414" y2="195" stroke="rgba(232,65,26,0.5)" stroke-width="1.5"/>
        <line x1="390" y1="185" x2="410" y2="205" stroke="rgba(232,65,26,0.5)" stroke-width="1.5"/>
        <line x1="410" y1="185" x2="390" y2="205" stroke="rgba(232,65,26,0.5)" stroke-width="1.5"/>

        <!-- Exhaust pipes -->
        <rect x="355" y="45" width="8" height="40" rx="4" fill="#333" stroke="rgba(232,65,26,0.3)" stroke-width="1"/>
        <rect x="368" y="50" width="8" height="35" rx="4" fill="#333" stroke="rgba(232,65,26,0.3)" stroke-width="1"/>

        <!-- Exhaust smoke particles (animated via JS) -->
      </svg>
    </div>

    <!-- Title -->
    <div id="title-wrapper">
      <span id="title-joshua">JOSHUA'S</span>
    </div>
    <span id="title-express">EXPRESS</span>
    <span id="title-deliveries">DELIVERIES</span>

    <!-- Divider -->
    <div id="divider"></div>

    <!-- Tagline -->
    <div id="tagline">
      <span>Fast</span> · Reliable · <span>Always On Time</span>
    </div>

    <!-- Badges -->
    <div id="badge-row">
      <div class="badge-pill">🚀 Swift Delivery</div>
      <div class="badge-pill">📦 All Areas</div>
      <div class="badge-pill">⚡ Express</div>
    </div>

    <!-- Continue button (inside main content, centred) -->
    <button id="continue-btn" onclick="goToMainSite()">Continue to Main Site</button>

  </div>
</div>

<!-- Transition wipe overlay -->
<div id="transition-wipe"></div>

<script>
// ── PARTICLE CANVAS ──────────────────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    alpha: Math.random() * 0.4 + 0.1,
    color: Math.random() > 0.7 ? '#e8411a' : '#ff9a00'
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Deep radial gradient bg
  const grad = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 0,
    canvas.width/2, canvas.height/2, canvas.width * 0.7
  );
  grad.addColorStop(0, '#1a0800');
  grad.addColorStop(0.4, '#100400');
  grad.addColorStop(1, '#060606');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Connect nearby particles
  particles.forEach((p1, i) => {
    particles.slice(i + 1).forEach(p2 => {
      const dx = p1.x - p2.x, dy = p1.y - p2.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = '#e8411a';
        ctx.globalAlpha = (1 - dist/100) * 0.08;
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    });
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── SPEED LINES ──────────────────────────────────────────────────────────────
function createSpeedLines() {
  const container = document.getElementById('speed-lines');
  container.style.opacity = '1';
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const line = document.createElement('div');
      line.className = 'speed-line';
      const top = Math.random() * 100;
      const delay = Math.random() * 0.4;
      line.style.cssText = `
        top: ${top}%;
        left: 0;
        animation-delay: ${delay}s;
        opacity: ${0.3 + Math.random() * 0.7};
        height: ${1 + Math.random() * 2}px;
      `;
      container.appendChild(line);
      setTimeout(() => line.remove(), 1200);
    }, i * 60);
  }
}
setTimeout(createSpeedLines, 600);
setTimeout(createSpeedLines, 1200);

// ── FLOATING DOM PARTICLES ────────────────────────────────────────────────────
function spawnDomParticles() {
  for (let i = 0; i < 25; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 2 + Math.random() * 5;
      const x = 20 + Math.random() * 60;
      const y = 20 + Math.random() * 60;
      const tx = (Math.random() - 0.5) * 300 + 'px';
      const ty = (Math.random() - 0.5) * 300 + 'px';
      const dur = 1.2 + Math.random() * 1.5;
      p.style.cssText = `
        left: ${x}vw; top: ${y}vh;
        width: ${size}px; height: ${size}px;
        background: ${Math.random() > 0.5 ? '#e8411a' : '#ff9a00'};
        --tx: ${tx}; --ty: ${ty};
        animation-duration: ${dur}s;
        animation-delay: ${Math.random() * 0.5}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (dur + 0.5) * 1000);
    }, i * 50);
  }
}
setTimeout(spawnDomParticles, 800);
setTimeout(spawnDomParticles, 1800);
setTimeout(spawnDomParticles, 2800);

// ── WHEEL SPIN ANIMATION ──────────────────────────────────────────────────────
let wheelAngle = 0;
const wheelCenters = [
  { cx: 120, cy: 195 },
  { cx: 200, cy: 195 },
  { cx: 400, cy: 195 },
];

// Animate wheel spokes via JS by rotating specific groups
// We'll use CSS rotate on the SVG via a transform
const truckSvg = document.getElementById('truck-svg');
let lastTime = 0;
function animateWheels(ts) {
  const dt = ts - lastTime;
  lastTime = ts;
  wheelAngle += 3;
  // Find all wheel spoke lines and rotate them around their center
  // Instead, let's use a simpler approach: animate the entire SVG slightly
  // The floating animation handles main movement; wheels are handled by CSS
  requestAnimationFrame(animateWheels);
}
requestAnimationFrame(animateWheels);

// ── 3D PARALLAX ON MOUSE MOVE ────────────────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;

  const wrapper = document.getElementById('main-wrapper');
  wrapper.style.transform = `
    rotateY(${dx * 8}deg)
    rotateX(${-dy * 5}deg)
    translateZ(0)
  `;
  wrapper.style.transition = 'transform 0.1s ease';
});

// ── AMBIENT SOUND PULSE (visual only) ────────────────────────────────────────
// Pulse the glow on beat
let beat = 0;
setInterval(() => {
  beat++;
  const glow = document.getElementById('truck-glow');
  if (beat % 2 === 0) {
    glow.style.transform = 'translateX(-50%) scaleX(1.4) scaleY(1.5)';
    glow.style.opacity = '0.9';
  } else {
    glow.style.transform = 'translateX(-50%) scaleX(1) scaleY(1)';
    glow.style.opacity = '0.5';
  }
  glow.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
}, 600);

// ── SPARKS from truck exhaust ─────────────────────────────────────────────────
function spawnExhaustSpark() {
  const container = document.getElementById('scene');
  const truckRect = document.getElementById('truck-svg').getBoundingClientRect();
  const sparkX = truckRect.left + truckRect.width * 0.74;
  const sparkY = truckRect.top + truckRect.height * 0.18;

  for (let i = 0; i < 3; i++) {
    const spark = document.createElement('div');
    spark.style.cssText = `
      position: fixed;
      width: ${2 + Math.random() * 4}px;
      height: ${2 + Math.random() * 4}px;
      background: ${['#ff9a00','#ffe566','#e8411a'][Math.floor(Math.random()*3)]};
      border-radius: 50%;
      left: ${sparkX + (Math.random()-0.5) * 10}px;
      top: ${sparkY + (Math.random() * 20)}px;
      z-index: 50;
      pointer-events: none;
      --tx: ${(Math.random()-0.5)*30}px;
      --ty: ${-20 - Math.random()*30}px;
      animation: particleFly ${0.4 + Math.random()*0.4}s ease-out forwards;
    `;
    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 800);
  }
}

// ── CONTINUE TO MAIN SITE ────────────────────────────────────────────────────
function goToMainSite() {
  const btn = document.getElementById('continue-btn');
  const wipe = document.getElementById('transition-wipe');

  // Disable button
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.5';

  // Flash the button briefly
  btn.style.background = '#fff';
  btn.style.color = '#e8411a';
  setTimeout(() => {
    btn.style.transition = 'none';

    // Trigger red wipe across screen
    wipe.classList.add('wipe-in');

    // After wipe completes, navigate
    setTimeout(() => {
      window.location.href = 'main.html';
    }, 520);
  }, 120);
}

setInterval(spawnExhaustSpark, 250);
</script>
</body>
</html>
